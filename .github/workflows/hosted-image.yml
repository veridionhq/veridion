name: hosted-image

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "src/**"
      - "docs/**"
      - "examples/**"
      - "db/**"
      - ".github/workflows/hosted-image.yml"
  push:
    branches:
      - develop
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "src/**"
      - "docs/**"
      - "examples/**"
      - "db/**"
      - ".github/workflows/hosted-image.yml"
  workflow_dispatch:
    inputs:
      push_to_ecr:
        description: "Push the built image to ECR"
        required: false
        default: true
        type: boolean
      image_tag:
        description: "Image tag to publish when pushing to ECR"
        required: false
        default: "alpha"
        type: string

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN != '' && vars.AWS_GITHUB_ACTIONS_ROLE_ARN || secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
      IMAGE_TAG: ${{ github.ref_name == 'develop' && 'alpha' || github.ref_name == 'main' && 'latest' || inputs.image_tag != '' && inputs.image_tag || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve publish mode
        id: publish_mode
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && ("${GITHUB_REF_NAME}" == "develop" || "${GITHUB_REF_NAME}" == "main") ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.push_to_ecr }}" == "true" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate ECR publish configuration
        if: ${{ steps.publish_mode.outputs.should_publish == 'true' }}
        run: |
          [[ -n "${ECR_REPOSITORY_URL}" ]] || { echo "ECR_REPOSITORY_URL repo variable is required for publish"; exit 1; }
          [[ -n "${AWS_GITHUB_ACTIONS_ROLE_ARN}" ]] || { echo "AWS_GITHUB_ACTIONS_ROLE_ARN repo variable or secret is required for publish"; exit 1; }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build hosted image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: veridion-hosted:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure AWS credentials
        if: ${{ steps.publish_mode.outputs.should_publish == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Log in to ECR
        if: ${{ steps.publish_mode.outputs.should_publish == 'true' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push hosted image to ECR
        if: ${{ steps.publish_mode.outputs.should_publish == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
