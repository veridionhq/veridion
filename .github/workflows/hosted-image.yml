name: hosted-image

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      push_to_ecr:
        description: "Push the built image to ECR"
        required: false
        default: true
        type: boolean
      image_tag:
        description: "Image tag to publish when pushing to ECR"
        required: false
        default: "alpha"
        type: string

jobs:
  publish-develop:
    if: ${{ github.event_name == 'push' && github.ref_name == 'develop' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN != '' && vars.AWS_GITHUB_ACTIONS_ROLE_ARN || secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
      AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN != '' && vars.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN || secrets.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN }}
      HOSTED_ECS_CLUSTER: ${{ vars.HOSTED_ECS_CLUSTER }}
      HOSTED_ECS_SERVICE: ${{ vars.HOSTED_ECS_SERVICE }}
      HOSTED_ECS_WORKER_SERVICE: ${{ vars.HOSTED_ECS_WORKER_SERVICE }}
      IMAGE_TAG: alpha
      SHA_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate publish configuration
        run: |
          [[ -n "${ECR_REPOSITORY_URL}" ]] || { echo "ECR_REPOSITORY_URL repo variable is required"; exit 1; }
          [[ -n "${AWS_GITHUB_ACTIONS_ROLE_ARN}" ]] || { echo "AWS_GITHUB_ACTIONS_ROLE_ARN repo variable or secret is required"; exit 1; }

      - name: Validate deploy configuration
        run: |
          [[ -n "${AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN}" ]] || { echo "AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN repo variable or secret is required"; exit 1; }
          [[ -n "${HOSTED_ECS_CLUSTER}" ]] || { echo "HOSTED_ECS_CLUSTER repo variable is required"; exit 1; }
          [[ -n "${HOSTED_ECS_SERVICE}" ]] || { echo "HOSTED_ECS_SERVICE repo variable is required"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push hosted image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REPOSITORY_URL }}:${{ env.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure AWS deploy credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN }}

      - name: Deploy hosted ECS services with immutable image
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_URI="${ECR_REPOSITORY_URL}:${SHA_TAG}"

          wait_for_service_image() {
            local service_name="$1"
            local container_name="$2"
            local expected_image="$3"
            local deadline
            local service_json
            local desired_count
            local rollout_state
            local deployed_task_def
            local deployed_image

            deadline=$((SECONDS + 240))
            while (( SECONDS < deadline )); do
              service_json="$(aws ecs describe-services --region "${AWS_REGION}" --cluster "${HOSTED_ECS_CLUSTER}" --services "${service_name}")"
              desired_count="$(printf '%s' "${service_json}" | jq -r '.services[0].desiredCount')"
              rollout_state="$(printf '%s' "${service_json}" | jq -r '.services[0].deployments[0].rolloutState')"
              deployed_task_def="$(printf '%s' "${service_json}" | jq -r '.services[0].taskDefinition')"
              deployed_image="$(
                aws ecs describe-task-definition \
                  --region "${AWS_REGION}" \
                  --task-definition "${deployed_task_def}" \
                  | jq -r --arg container "${container_name}" '.taskDefinition.containerDefinitions[] | select(.name == $container) | .image'
              )"

              if [[ "${deployed_image}" == "${expected_image}" ]]; then
                if [[ "${desired_count}" == "0" ]]; then
                  return 0
                fi
                if [[ "${rollout_state}" == "COMPLETED" ]]; then
                  return 0
                fi
              fi

              sleep 10
            done

            echo "deploy verification timed out for ${service_name}"
            echo "expected image: ${expected_image}"
            echo "last task definition: ${deployed_task_def}"
            echo "last deployed image: ${deployed_image}"
            echo "last rollout state: ${rollout_state}"
            echo "last desired count: ${desired_count}"
            exit 1
          }

          deploy_service() {
            local service_name="$1"
            local container_name="$2"
            local service_json
            local current_task_def
            local task_json
            local rendered_td
            local new_task_def_arn

            service_json="$(aws ecs describe-services --region "${AWS_REGION}" --cluster "${HOSTED_ECS_CLUSTER}" --services "${service_name}")"
            current_task_def="$(printf '%s' "${service_json}" | jq -r '.services[0].taskDefinition')"
            task_json="$(aws ecs describe-task-definition --region "${AWS_REGION}" --task-definition "${current_task_def}")"

            rendered_td="$(printf '%s' "${task_json}" | jq --arg image "${IMAGE_URI}" --arg container "${container_name}" '
              .taskDefinition
              | {
                  family,
                  taskRoleArn,
                  executionRoleArn,
                  networkMode,
                  containerDefinitions,
                  volumes,
                  placementConstraints,
                  requiresCompatibilities,
                  cpu,
                  memory,
                  runtimePlatform,
                  ephemeralStorage,
                  pidMode,
                  ipcMode,
                  proxyConfiguration,
                  inferenceAccelerators
                }
              | .containerDefinitions |= map(if .name == $container then .image = $image else . end)
              | with_entries(select(.value != null and .value != []))
            ')"

            new_task_def_arn="$(
              aws ecs register-task-definition \
                --region "${AWS_REGION}" \
                --cli-input-json "${rendered_td}" \
                | jq -r '.taskDefinition.taskDefinitionArn'
            )"

            aws ecs update-service \
              --region "${AWS_REGION}" \
              --cluster "${HOSTED_ECS_CLUSTER}" \
              --service "${service_name}" \
              --task-definition "${new_task_def_arn}"
            wait_for_service_image "${service_name}" "${container_name}" "${IMAGE_URI}"
          }

          deploy_service "${HOSTED_ECS_SERVICE}" "history-service"
          if [[ -n "${HOSTED_ECS_WORKER_SERVICE}" ]]; then
            deploy_service "${HOSTED_ECS_WORKER_SERVICE}" "scheduler-worker"
          fi

  publish-main:
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN != '' && vars.AWS_GITHUB_ACTIONS_ROLE_ARN || secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
      IMAGE_TAG: latest
      SHA_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate publish configuration
        run: |
          [[ -n "${ECR_REPOSITORY_URL}" ]] || { echo "ECR_REPOSITORY_URL repo variable is required"; exit 1; }
          [[ -n "${AWS_GITHUB_ACTIONS_ROLE_ARN}" ]] || { echo "AWS_GITHUB_ACTIONS_ROLE_ARN repo variable or secret is required"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push hosted image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REPOSITORY_URL }}:${{ env.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-manual:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.push_to_ecr }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN != '' && vars.AWS_GITHUB_ACTIONS_ROLE_ARN || secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      SHA_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate publish configuration
        run: |
          [[ -n "${ECR_REPOSITORY_URL}" ]] || { echo "ECR_REPOSITORY_URL repo variable is required"; exit 1; }
          [[ -n "${AWS_GITHUB_ACTIONS_ROLE_ARN}" ]] || { echo "AWS_GITHUB_ACTIONS_ROLE_ARN repo variable or secret is required"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push hosted image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REPOSITORY_URL }}:${{ env.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
