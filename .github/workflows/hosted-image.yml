name: hosted-image

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "src/**"
      - "docs/**"
      - "examples/**"
      - "db/**"
      - ".github/workflows/hosted-image.yml"
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      push_to_ecr:
        description: "Push the built image to ECR"
        required: false
        default: true
        type: boolean
      image_tag:
        description: "Image tag to publish when pushing to ECR"
        required: false
        default: "alpha"
        type: string

jobs:
  pr-build:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build hosted image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: veridion-hosted:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-develop:
    if: ${{ github.event_name == 'push' && github.ref_name == 'develop' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN != '' && vars.AWS_GITHUB_ACTIONS_ROLE_ARN || secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
      AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN != '' && vars.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN || secrets.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN }}
      HOSTED_ECS_CLUSTER: ${{ vars.HOSTED_ECS_CLUSTER }}
      HOSTED_ECS_SERVICE: ${{ vars.HOSTED_ECS_SERVICE }}
      HOSTED_ECS_WORKER_SERVICE: ${{ vars.HOSTED_ECS_WORKER_SERVICE }}
      IMAGE_TAG: alpha
    steps:
      - uses: actions/checkout@v4

      - name: Validate publish configuration
        run: |
          [[ -n "${ECR_REPOSITORY_URL}" ]] || { echo "ECR_REPOSITORY_URL repo variable is required"; exit 1; }
          [[ -n "${AWS_GITHUB_ACTIONS_ROLE_ARN}" ]] || { echo "AWS_GITHUB_ACTIONS_ROLE_ARN repo variable or secret is required"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push hosted image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure AWS deploy credentials
        if: ${{ env.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN != '' && env.HOSTED_ECS_CLUSTER != '' && env.HOSTED_ECS_SERVICE != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN }}

      - name: Roll hosted ECS services
        if: ${{ env.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN != '' && env.HOSTED_ECS_CLUSTER != '' && env.HOSTED_ECS_SERVICE != '' }}
        shell: bash
        run: |
          set -euo pipefail
          aws ecs update-service \
            --region "${AWS_REGION}" \
            --cluster "${HOSTED_ECS_CLUSTER}" \
            --service "${HOSTED_ECS_SERVICE}" \
            --force-new-deployment
          if [[ -n "${HOSTED_ECS_WORKER_SERVICE}" ]]; then
            aws ecs update-service \
              --region "${AWS_REGION}" \
              --cluster "${HOSTED_ECS_CLUSTER}" \
              --service "${HOSTED_ECS_WORKER_SERVICE}" \
              --force-new-deployment
          fi

  publish-main:
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN != '' && vars.AWS_GITHUB_ACTIONS_ROLE_ARN || secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
      IMAGE_TAG: latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate publish configuration
        run: |
          [[ -n "${ECR_REPOSITORY_URL}" ]] || { echo "ECR_REPOSITORY_URL repo variable is required"; exit 1; }
          [[ -n "${AWS_GITHUB_ACTIONS_ROLE_ARN}" ]] || { echo "AWS_GITHUB_ACTIONS_ROLE_ARN repo variable or secret is required"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push hosted image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-manual:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.push_to_ecr }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN != '' && vars.AWS_GITHUB_ACTIONS_ROLE_ARN || secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate publish configuration
        run: |
          [[ -n "${ECR_REPOSITORY_URL}" ]] || { echo "ECR_REPOSITORY_URL repo variable is required"; exit 1; }
          [[ -n "${AWS_GITHUB_ACTIONS_ROLE_ARN}" ]] || { echo "AWS_GITHUB_ACTIONS_ROLE_ARN repo variable or secret is required"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push hosted image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
