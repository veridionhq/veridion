name: rdi-pr-comment

on:
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  release-decision-intelligence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate diff artifact
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --no-ext-diff --unified=0 \
              "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > pr.diff
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --no-ext-diff --unified=0 HEAD^ HEAD > pr.diff
          else
            : > pr.diff
          fi

      - name: Build PR metadata artifact
        shell: bash
        env:
          PYTHONPATH: src
        run: |
          python3 -m veridion.action.metadata_builder \
            --event-path "${GITHUB_EVENT_PATH}" \
            --base-ref "${{ github.base_ref }}" \
            --output-path pr-metadata.json

      - name: Run Veridion RDI
        id: run-rdi
        uses: ./
        with:
          diff-path: pr.diff
          reports: |
            trivy=artifacts/trivy.json
            semgrep=artifacts/semgrep.json
            grype=artifacts/grype.json
            syft=artifacts/syft.json
          baseline-reports: |
            trivy=artifacts/baseline-trivy.json
            semgrep=artifacts/baseline-semgrep.json
            grype=artifacts/baseline-grype.json
            syft=artifacts/baseline-syft.json
          policy-path: examples/policy/veridion-policy.yaml
          metadata-path: pr-metadata.json
          comment-path: veridion-pr-comment.md
          json-output-path: veridion-result.json
          post-comment: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          pull-request-number: ${{ github.event.pull_request.number }}

      - name: Show outputs
        shell: bash
        run: |
          echo "Decision: ${{ steps.run-rdi.outputs.decision }}"
          echo "Score: ${{ steps.run-rdi.outputs.score }}"
          echo "Confidence: ${{ steps.run-rdi.outputs.confidence }}"
          echo "Comment identifier: ${{ steps.run-rdi.outputs.comment_identifier }}"
          echo "Comment mode: ${{ steps.run-rdi.outputs.comment_mode }}"
          echo "Comment id: ${{ steps.run-rdi.outputs.comment_id }}"

      - name: Upload RDI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rdi-pr-comment-artifacts
          path: |
            veridion-pr-comment.md
            veridion-result.json
            pr-metadata.json
