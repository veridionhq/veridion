name: smoke-rdi

on:
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  smoke-rdi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build sample diff
        shell: bash
        run: cp tests/fixtures/diffs/sample_pr.diff pr.diff

      - name: Run Veridion RDI smoke
        id: run-rdi
        uses: ./
        with:
          diff-path: pr.diff
          reports: |
            trivy=tests/fixtures/scanners/trivy_report.json
            semgrep=tests/fixtures/scanners/semgrep_report.json
            grype=tests/fixtures/scanners/grype_report.json
            syft=tests/fixtures/scanners/syft_report.json
          baseline-reports: |
            semgrep=tests/fixtures/scanners/semgrep_report.json
          policy-path: tests/fixtures/policies/default_policy.yaml
          comment-path: veridion-pr-comment.md
          json-output-path: veridion-result.json

      - name: Show outputs
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("veridion-result.json").read_text())
          print(f"Decision: {result['decision']['decision']}")
          print(f"Score: {result['decision']['score']}")
          print(f"Confidence: {result['decision']['confidence']}")
          print(f"Comment identifier: {result['comment_identifier']}")
          PY
