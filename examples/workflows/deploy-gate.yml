name: veridion-deploy-gate

on:
  pull_request:

jobs:
  release-decision-intelligence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Veridion RDI
        id: run-rdi
        uses: veridionhq/veridion@main
        with:
          diff-path: pr.diff
          reports: ${{ vars.VERIDION_REPORTS }}
          baseline-reports: ${{ vars.VERIDION_BASELINE_REPORTS }}
          policy-path: .veridion/policy.yaml
          trust-profile-source-path: .veridion/trust-profile.source.json
          trust-catalog-source-path: .veridion/trust-catalog.source.json
          suppression-path: .veridion/suppressions.json
          approval-map-path: .veridion/approval-map.json
          comment-path: veridion-pr-comment.md
          json-output-path: veridion-result.json
          decision-contract-path: veridion-decision.json
          decision-event-path: veridion-decision-event.json
          decision-history-path: veridion-decision-history.ndjson
          enforce-decision: "true"
          allowed-decisions: "GO"
          verify-approvals: "true"
          enforce-approval-satisfaction: "true"
          post-comment: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          pull-request-number: ${{ github.event.pull_request.number }}

      - name: Show next steps for reviewers
        if: always()
        shell: bash
        run: |
          echo "Gate status: ${{ steps.run-rdi.outputs.gate_status }}"
          echo "Approval gate: ${{ steps.run-rdi.outputs.approval_gate_status }}"
          echo "Blocking categories: ${{ steps.run-rdi.outputs.blocking_categories_json }}"
          echo "Required next steps: ${{ steps.run-rdi.outputs.required_next_steps_json }}"
          echo "Decision event: ${{ steps.run-rdi.outputs.decision_event_path }}"
          echo "Inspect veridion-decision.json -> signals.runtime.active_runtime_gates for live runtime blockers"
