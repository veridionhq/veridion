server {
  listen 8080;
  server_name _;

  location / {
    proxy_pass http://history-service:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Veridion-Auth-Secret replace-me-with-a-real-proxy-secret;
    proxy_set_header X-Veridion-Principal ops@example.com;
    proxy_set_header X-Veridion-Token-Id proxy-reader-1;
    proxy_set_header X-Veridion-Roles reader,materializer;
    proxy_set_header X-Veridion-Tenants acme;
    proxy_set_header X-Veridion-Status active;
  }
}
