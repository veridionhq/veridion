version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: veridion_history
      POSTGRES_USER: veridion
      POSTGRES_PASSWORD: veridion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -lc "pip install -e '.[db]' &&
      veridion-history-store migrate --store-dsn postgresql://veridion:veridion@postgres:5432/veridion_history"
    volumes:
      - ../..:/app
    depends_on:
      - postgres

  history-service:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -lc "pip install -e '.[db,aws]' &&
      veridion-history-service --config-path examples/hosted/history-service.jwt.config.json --host 0.0.0.0 --port 8787"
    ports:
      - "8787:8787"
    volumes:
      - ../..:/app
      - ./jwks.json:/app/examples/hosted/jwks.json:ro
      - hosted_materializations:/tmp/veridion-materialized
    depends_on:
      - postgres
      - migrate

  scheduler-worker:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -lc "pip install -e '.[db,aws]' &&
      veridion-history-scheduler --config-path examples/hosted/history-service.jwt.config.json --daemon --poll-interval-seconds 60"
    volumes:
      - ../..:/app
      - hosted_materializations:/tmp/veridion-materialized
    depends_on:
      - postgres
      - migrate

  reverse-proxy:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx-trusted-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - history-service

volumes:
  postgres_data:
  hosted_materializations:
