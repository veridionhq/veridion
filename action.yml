name: "Veridion RDI"
description: "Release Decision Intelligence for pull requests"
inputs:
  diff-path:
    description: "Path to a unified diff file for the current change"
    required: true
  reports:
    description: "Newline-delimited TOOL=PATH mappings for current scanner reports"
    required: false
    default: ""
  baseline-reports:
    description: "Newline-delimited TOOL=PATH mappings for baseline scanner reports"
    required: false
    default: ""
  policy-path:
    description: "Path to policy YAML"
    required: false
    default: ""
  operational-context-path:
    description: "Path to optional versioned operational-context JSON; when provided, metadata-path and trust-profile-path are ignored"
    required: false
    default: ""
  trust-profile-source-path:
    description: "Path to repo-local trust-profile source JSON used to build trust-profile and operational-context artifacts inside the action"
    required: false
    default: ""
  trust-catalog-source-path:
    description: "Path to optional shared trust catalog source JSON layered under trust-profile-source-path inside the action"
    required: false
    default: ""
  metadata-path:
    description: "Path to optional pull request metadata JSON for AI attribution; ignored when operational-context-path is provided"
    required: false
    default: ""
  trust-profile-path:
    description: "Path to optional trust profile JSON for repo, service, and team posture; ignored when operational-context-path is provided"
    required: false
    default: ""
  suppression-path:
    description: "Path to optional accepted-risk suppression JSON"
    required: false
    default: ""
  comment-summary-provider:
    description: "Optional wording model provider for PR comment summarization: openai, anthropic, or bedrock"
    required: false
    default: ""
  comment-summary-model:
    description: "Optional wording model id used when comment-summary-provider is enabled"
    required: false
    default: ""
  comment-summary-api-key:
    description: "Optional API key for OpenAI or Anthropic comment summarization"
    required: false
    default: ""
  comment-summary-base-url:
    description: "Optional API base URL override for OpenAI-compatible or Anthropic comment summarization"
    required: false
    default: ""
  comment-summary-region:
    description: "Optional AWS region for Bedrock comment summarization"
    required: false
    default: ""
  comment-summary-style:
    description: "Optional wording style for AI comment summarization: terse or expanded"
    required: false
    default: "terse"
  comment-path:
    description: "Path to write the rendered PR comment markdown"
    required: false
    default: "veridion-pr-comment.md"
  json-output-path:
    description: "Path to write structured JSON output"
    required: false
    default: "veridion-result.json"
  decision-contract-path:
    description: "Path to write machine-facing decision contract JSON"
    required: false
    default: "veridion-decision.json"
  enforce-decision:
    description: "Whether to fail the action when the final decision is not allowed"
    required: false
    default: "false"
  allowed-decisions:
    description: "Comma-separated decisions allowed to pass when enforce-decision is true"
    required: false
    default: "GO,CONDITIONAL GO"
  github-token:
    description: "GitHub token used to upsert the PR comment"
    required: false
    default: ""
  repository:
    description: "GitHub repository in owner/repo format"
    required: false
    default: ""
  pull-request-number:
    description: "Pull request number to comment on"
    required: false
    default: ""
  post-comment:
    description: "Whether to create or update the PR comment"
    required: false
    default: "false"
outputs:
  decision:
    description: "Final release decision"
    value: ${{ steps.run-rdi.outputs.decision }}
  score:
    description: "RDI score"
    value: ${{ steps.run-rdi.outputs.score }}
  confidence:
    description: "Decision confidence"
    value: ${{ steps.run-rdi.outputs.confidence }}
  required_approvals:
    description: "Comma-separated approval roles"
    value: ${{ steps.run-rdi.outputs.required_approvals }}
  comment_path:
    description: "Path to rendered PR comment"
    value: ${{ steps.run-rdi.outputs.comment_path }}
  json_output_path:
    description: "Path to structured JSON result"
    value: ${{ steps.run-rdi.outputs.json_output_path }}
  decision_contract_path:
    description: "Path to machine-facing decision contract JSON"
    value: ${{ steps.run-rdi.outputs.decision_contract_path }}
  comment_identifier:
    description: "Stable comment identifier"
    value: ${{ steps.run-rdi.outputs.comment_identifier }}
  gate_status:
    description: "Stable gate status for workflow automation: pass, review, or block"
    value: ${{ steps.run-rdi.outputs.gate_status }}
  decision_allowed:
    description: "Whether the final decision is allowed by the configured action gate"
    value: ${{ steps.run-rdi.outputs.decision_allowed }}
  required_approvals_json:
    description: "JSON array of required approval roles"
    value: ${{ steps.run-rdi.outputs.required_approvals_json }}
  required_next_steps_json:
    description: "JSON array of required next steps"
    value: ${{ steps.run-rdi.outputs.required_next_steps_json }}
  blocking_reasons_json:
    description: "JSON array of blocking reasons"
    value: ${{ steps.run-rdi.outputs.blocking_reasons_json }}
  blocking_categories_json:
    description: "JSON array of normalized blocking categories"
    value: ${{ steps.run-rdi.outputs.blocking_categories_json }}
  accepted_risk_present:
    description: "Whether active accepted-risk suppressions are present in the change"
    value: ${{ steps.run-rdi.outputs.accepted_risk_present }}
  comment_id:
    description: "GitHub comment id when comment posting is enabled"
    value: ${{ steps.comment-rdi.outputs.comment_id }}
  comment_mode:
    description: "Whether the PR comment was created or updated"
    value: ${{ steps.comment-rdi.outputs.comment_mode }}
runs:
  using: "composite"
  steps:
    - name: Prepare Veridion context
      id: prepare-context
      shell: bash
      env:
        INPUT_OPERATIONAL_CONTEXT_PATH: ${{ inputs.operational-context-path }}
        INPUT_TRUST_PROFILE_SOURCE_PATH: ${{ inputs.trust-profile-source-path }}
        INPUT_TRUST_CATALOG_SOURCE_PATH: ${{ inputs.trust-catalog-source-path }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_BASE_REF: ${{ github.base_ref }}
        PYTHONPATH: ${{ github.action_path }}/src
      run: |
        set -euo pipefail
        if [[ -n "${INPUT_OPERATIONAL_CONTEXT_PATH}" ]]; then
          echo "operational_context_path=${INPUT_OPERATIONAL_CONTEXT_PATH}" >> "${GITHUB_OUTPUT}"
          exit 0
        fi
        if [[ -z "${INPUT_TRUST_PROFILE_SOURCE_PATH}" ]]; then
          echo "operational_context_path=" >> "${GITHUB_OUTPUT}"
          exit 0
        fi
        temp_dir="$(mktemp -d)"
        trust_profile_path="${temp_dir}/trust-profile.json"
        operational_context_path="${temp_dir}/operational-context.json"
        trust_catalog_args=()
        if [[ -n "${INPUT_TRUST_CATALOG_SOURCE_PATH}" ]]; then
          trust_catalog_args+=(--catalog-path "${INPUT_TRUST_CATALOG_SOURCE_PATH}")
        fi
        python3 -m veridion.action.trust_profile_builder \
          "${trust_catalog_args[@]}" \
          --config-path "${INPUT_TRUST_PROFILE_SOURCE_PATH}" \
          --output-path "${trust_profile_path}"
        operational_context_args=(
          --event-path "${GITHUB_EVENT_PATH}"
          --trust-profile-path "${trust_profile_path}"
          --output-path "${operational_context_path}"
        )
        if [[ -n "${GITHUB_BASE_REF}" ]]; then
          operational_context_args+=(--base-ref "${GITHUB_BASE_REF}")
        fi
        python3 -m veridion.action.operational_context_builder "${operational_context_args[@]}"
        echo "operational_context_path=${operational_context_path}" >> "${GITHUB_OUTPUT}"
    - name: Run Veridion RDI
      id: run-rdi
      shell: bash
      env:
        INPUT_DIFF_PATH: ${{ inputs.diff-path }}
        INPUT_REPORTS: ${{ inputs.reports }}
        INPUT_BASELINE_REPORTS: ${{ inputs.baseline-reports }}
        INPUT_POLICY_PATH: ${{ inputs.policy-path }}
        INPUT_OPERATIONAL_CONTEXT_PATH: ${{ steps.prepare-context.outputs.operational_context_path }}
        INPUT_METADATA_PATH: ${{ inputs.metadata-path }}
        INPUT_TRUST_PROFILE_PATH: ${{ inputs.trust-profile-path }}
        INPUT_SUPPRESSION_PATH: ${{ inputs.suppression-path }}
        INPUT_COMMENT_SUMMARY_PROVIDER: ${{ inputs.comment-summary-provider }}
        INPUT_COMMENT_SUMMARY_MODEL: ${{ inputs.comment-summary-model }}
        INPUT_COMMENT_SUMMARY_API_KEY: ${{ inputs.comment-summary-api-key }}
        INPUT_COMMENT_SUMMARY_BASE_URL: ${{ inputs.comment-summary-base-url }}
        INPUT_COMMENT_SUMMARY_REGION: ${{ inputs.comment-summary-region }}
        INPUT_COMMENT_SUMMARY_STYLE: ${{ inputs.comment-summary-style }}
        INPUT_COMMENT_PATH: ${{ inputs.comment-path }}
        INPUT_JSON_OUTPUT_PATH: ${{ inputs.json-output-path }}
        INPUT_DECISION_CONTRACT_PATH: ${{ inputs.decision-contract-path }}
        INPUT_ENFORCE_DECISION: ${{ inputs.enforce-decision }}
        INPUT_ALLOWED_DECISIONS: ${{ inputs.allowed-decisions }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_PULL_REQUEST_NUMBER: ${{ inputs.pull-request-number }}
        INPUT_POST_COMMENT: ${{ inputs.post-comment }}
        PYTHONPATH: ${{ github.action_path }}/src
      run: |
        set -euo pipefail
        reports_args=()
        if [[ -n "${INPUT_REPORTS}" ]]; then
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            reports_args+=(--report "$line")
          done <<< "${INPUT_REPORTS}"
        fi
        baseline_args=()
        if [[ -n "${INPUT_BASELINE_REPORTS}" ]]; then
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            baseline_args+=(--baseline-report "$line")
          done <<< "${INPUT_BASELINE_REPORTS}"
        fi
        policy_args=()
        if [[ -n "${INPUT_POLICY_PATH}" ]]; then
          policy_args+=(--policy-path "${INPUT_POLICY_PATH}")
        fi
        operational_context_args=()
        if [[ -n "${INPUT_OPERATIONAL_CONTEXT_PATH}" ]]; then
          operational_context_args+=(--operational-context-path "${INPUT_OPERATIONAL_CONTEXT_PATH}")
        fi
        metadata_args=()
        if [[ -n "${INPUT_METADATA_PATH}" ]]; then
          metadata_args+=(--metadata-path "${INPUT_METADATA_PATH}")
        fi
        trust_profile_args=()
        if [[ -n "${INPUT_TRUST_PROFILE_PATH}" ]]; then
          trust_profile_args+=(--trust-profile-path "${INPUT_TRUST_PROFILE_PATH}")
        fi
        suppression_args=()
        if [[ -n "${INPUT_SUPPRESSION_PATH}" ]]; then
          suppression_args+=(--suppression-path "${INPUT_SUPPRESSION_PATH}")
        fi
        summary_args=()
        if [[ -n "${INPUT_COMMENT_SUMMARY_PROVIDER}" ]]; then
          summary_args+=(--comment-summary-provider "${INPUT_COMMENT_SUMMARY_PROVIDER}")
        fi
        if [[ -n "${INPUT_COMMENT_SUMMARY_MODEL}" ]]; then
          summary_args+=(--comment-summary-model "${INPUT_COMMENT_SUMMARY_MODEL}")
        fi
        if [[ -n "${INPUT_COMMENT_SUMMARY_API_KEY}" ]]; then
          summary_args+=(--comment-summary-api-key "${INPUT_COMMENT_SUMMARY_API_KEY}")
        fi
        if [[ -n "${INPUT_COMMENT_SUMMARY_BASE_URL}" ]]; then
          summary_args+=(--comment-summary-base-url "${INPUT_COMMENT_SUMMARY_BASE_URL}")
        fi
        if [[ -n "${INPUT_COMMENT_SUMMARY_REGION}" ]]; then
          summary_args+=(--comment-summary-region "${INPUT_COMMENT_SUMMARY_REGION}")
        fi
        if [[ -n "${INPUT_COMMENT_SUMMARY_STYLE}" ]]; then
          summary_args+=(--comment-summary-style "${INPUT_COMMENT_SUMMARY_STYLE}")
        fi
        python3 -m veridion.action \
          --diff-path "${INPUT_DIFF_PATH}" \
          "${reports_args[@]}" \
          "${baseline_args[@]}" \
          "${policy_args[@]}" \
          "${operational_context_args[@]}" \
          "${metadata_args[@]}" \
          "${trust_profile_args[@]}" \
          "${suppression_args[@]}" \
          "${summary_args[@]}" \
          --comment-path "${INPUT_COMMENT_PATH}" \
          --json-output-path "${INPUT_JSON_OUTPUT_PATH}" \
          --decision-contract-path "${INPUT_DECISION_CONTRACT_PATH}" \
          --enforce-decision "${INPUT_ENFORCE_DECISION}" \
          --allowed-decisions "${INPUT_ALLOWED_DECISIONS}"
    - name: Post Veridion PR comment
      id: comment-rdi
      if: ${{ inputs.post-comment == 'true' }}
      shell: bash
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_PULL_REQUEST_NUMBER: ${{ inputs.pull-request-number }}
        INPUT_COMMENT_PATH: ${{ inputs.comment-path }}
        PYTHONPATH: ${{ github.action_path }}/src
      run: |
        set -euo pipefail
        [[ -n "${INPUT_GITHUB_TOKEN}" ]] || { echo "github-token is required when post-comment=true" >&2; exit 1; }
        [[ -n "${INPUT_REPOSITORY}" ]] || { echo "repository is required when post-comment=true" >&2; exit 1; }
        [[ -n "${INPUT_PULL_REQUEST_NUMBER}" ]] || { echo "pull-request-number is required when post-comment=true" >&2; exit 1; }
        python3 -m veridion.action.github_comment \
          --repository "${INPUT_REPOSITORY}" \
          --pull-request-number "${INPUT_PULL_REQUEST_NUMBER}" \
          --github-token "${INPUT_GITHUB_TOKEN}" \
          --comment-path "${INPUT_COMMENT_PATH}"
